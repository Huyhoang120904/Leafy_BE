server:
  port: ${SERVER_PORT:8084}

spring:
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: ${MONGODB_PORT:27017}
      database: ${MONGODB_FILE_DATABASE:leafy_file}
      username: ${MONGODB_USERNAME:admin}
      password: ${MONGODB_PASSWORD:admin123}
      authentication-database: admin

# File upload configuration
file:
  upload:
    max-size: ${FILE_UPLOAD_MAX_SIZE:10485760} # 10MB
    allowed-extensions: ${FILE_UPLOAD_ALLOWED_EXTENSIONS:jpg,jpeg,png,gif,pdf,doc,docx}
  storage:
    type: ${FILE_STORAGE_TYPE:local} # local, s3, azure
    local:
      path: ${FILE_STORAGE_LOCAL_PATH:./uploads}
    s3:
      bucket: ${FILE_STORAGE_S3_BUCKET:}
      region: ${FILE_STORAGE_S3_REGION:}
      access-key: ${FILE_STORAGE_S3_ACCESS_KEY:}
      secret-key: ${FILE_STORAGE_S3_SECRET_KEY:}
